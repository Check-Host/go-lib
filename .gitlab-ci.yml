# GitLab CI for the Check-Host Go SDK.
#
# Sync to github.com/Check-Host/go-lib is handled by a GitLab native
# push mirror.

stages:
  - lint
  - test
  - build

default:
  image: golang:1.25-alpine

variables:
  CGO_ENABLED: "0"
  GOFLAGS: "-buildvcs=false"

lint:
  stage: lint
  script:
    - go vet ./...
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

test:
  stage: test
  script:
    - go test -cover ./...
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

build:
  stage: build
  script:
    - go build ./...
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
